<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゆうみのパチスロ</title>

<style>

body{
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
margin-top:80px;
}

h1{
font-size:50px;
}

#slot{
font-size:90px;
letter-spacing:30px;
margin:40px;
}

button{
font-size:30px;
padding:20px 60px;
border:none;
border-radius:15px;
background:red;
color:white;
cursor:pointer;
}

#result{
font-size:35px;
margin-top:30px;
height:50px;
}

.win{
color:gold;
font-size:45px;
animation:flash 0.4s infinite;
}

@keyframes flash{
0%{color:gold;}
50%{color:white;}
100%{color:gold;}
}

</style>
</head>

<body>

<h1>🎰 ゆうみのパチスロ 🎰</h1>

<div id="slot">？ ？ ？</div>

<button onclick="start()">START</button>

<div id="result"></div>

<script>

const symbols = ["𝟕","𝟑","🍒","BAR","🔔","💎","🍉"];

let timer;

function start(){

document.getElementById("result").className="";
document.getElementById("result").innerHTML="";

const click = new Audio("https://actions.google.com/sounds/v1/alarms/clock_ticking.ogg");
const win = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

let count=0;

timer=setInterval(()=>{

let a=symbols[Math.floor(Math.random()*symbols.length)];
let b=symbols[Math.floor(Math.random()*symbols.length)];
let c=symbols[Math.floor(Math.random()*symbols.length)];

document.getElementById("slot").innerHTML=a+" "+b+" "+c;

click.currentTime=0;
click.play();

count++;

if(count>20){

clearInterval(timer);

let result=document.getElementById("result");

if(a=="𝟕" && b=="𝟕" && c=="𝟕"){

result.className="win";
result.innerHTML="🎉🎉🎉 BIG BONUS 🎉🎉🎉";
win.play();

}
else if(a=="🍒" || b=="🍒" || c=="🍒"){

result.innerHTML="🍒 チェリー当たり！";

}
else{

result.innerHTML="はずれ";

}

}

},100);

}

</script>

</body>
</html>
