<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎰 ゆうみのスロット 🎰</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
  background:linear-gradient(#fff5f5,#ffecec);
  margin:0;
}
h1{
  font-size:36px;
  color:#b30000;
  margin-top:20px;
  text-shadow:1px 1px 2px gold;
}
.arrow{
  font-size:40px;
  color:red;
  margin-top:10px;
}
.slot{
  display:flex;
  justify-content:center;
  margin:10px auto 30px auto;
}
.reel{
  font-size:54px;
  width:140px;
  height:110px;
  margin:0 6px;
  border:3px solid red;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff0f0;
  box-shadow:0 0 12px red inset;
  overflow:hidden;
}
button{
  font-size:26px;
  padding:15px 40px;
  margin:10px;
  background:#d60000;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  box-shadow:0 0 10px gold;
}
#pointFrame{
  font-size:28px;
  margin:20px auto;
  padding:10px;
  width:320px;
  border:3px solid red;
  border-radius:12px;
  background:#fff0f0;
  color:#b30000;
  text-shadow:1px 1px 2px gold;
  white-space: pre-line;
}
#result{
  font-size:28px;
  margin-top:20px;
  color:#b30000;
  white-space: pre-line;
  text-shadow:1px 1px 2px gold;
}
.win{
  font-size:38px;
  color:gold;
  animation:flash 0.3s infinite;
}
@keyframes flash{
  0%{background:white;}
  50%{background:gold;}
  100%{background:white;}
}
</style>
</head>

<body>

<h1>🎰 ゆうみのスロット 🎰</h1>
<div class="arrow">▼ ▼ ▼</div>

<div class="slot">
  <div id="reel1" class="reel">❔</div>
  <div id="reel2" class="reel">❔</div>
  <div id="reel3" class="reel">❔</div>
</div>

<!-- リザルトメッセージ -->
<div id="result"></div>

<!-- POINT外枠（累計＋今回獲得POINT） -->
<div id="pointFrame">累計POINT：0\n今回獲得POINT：0</div>

<!-- 操作ボタン（POINT購入ボタンを削除） -->
<button onclick="resetPoints()">累計POINTリセット</button>
<button onclick="spin()">スピン</button>

<audio id="win" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0c67.mp3"></audio>
<audio id="click" src="https://actions.google.com/sounds/v1/alarms/clock_ticking.ogg"></audio>

<script>
const symbols=["𝟕","𝟑","🍒","BAR","🔔","💎","🍉"];
const triplePoints = {
  "𝟕": 1000,
  "𝟑": 200,
  "🍒": 130,
  "BAR": 180,
  "🔔": 140,
  "💎": 60,
  "🍉": 20
};

// localStorageから累計POINT読み込み
let totalPoint = parseInt(localStorage.getItem("totalPoint")) || 0;
updatePointFrame(0);

// 図柄描画
function drawSymbol(symbol){
  if(symbol==="𝟕") return `<span style="display:block;width:100%;background:white;color:red;text-align:center;padding:6px 0;font-weight:bold;border:3px solid red;border-radius:6px;font-size:85px">𝟕</span>`;
  if(symbol==="𝟑") return `<span style="color:blue;font-weight:bold;font-size:85px">𝟑</span>`;
  if(symbol==="BAR") return `<span style="background:black;color:white;padding:6px 16px;border-radius:6px;border:2px solid red;font-weight:bold;font-size:40px">BAR</span>`;
  return `<span style="font-size:60px">${symbol}</span>`;
}

// POINT枠表示更新（累計 + 今回獲得）
function updatePointFrame(lastPoint){
  document.getElementById("pointFrame").innerText = `累計POINT：${totalPoint}\n今回獲得POINT：${lastPoint}`;
}

// スピン処理
function spin(){
  // 3POINT消費（マイナスでも可）
  totalPoint -= 10;
  updatePointFrame(0);

  let reels = [
    document.getElementById("reel1"),
    document.getElementById("reel2"),
    document.getElementById("reel3")
  ];

  let resultArr = [];
  let click = document.getElementById("click");
  document.getElementById("result").innerText="";

  let spin1=setInterval(()=>{
    let s = symbols[Math.floor(Math.random()*symbols.length)];
    reels[0].innerHTML = drawSymbol(s);
    click.currentTime = 0; click.play();
  },80);

  let spin2=setInterval(()=>{
    let s = symbols[Math.floor(Math.random()*symbols.length)];
    reels[1].innerHTML = drawSymbol(s);
    click.currentTime = 0; click.play();
  },80);

  let spin3=setInterval(()=>{
    let s = symbols[Math.floor(Math.random()*symbols.length)];
    reels[2].innerHTML = drawSymbol(s);
    click.currentTime = 0; click.play();
  },80);

  setTimeout(()=>{
    clearInterval(spin1);
    resultArr[0] = reels[0].innerText;
  },1200);

  setTimeout(()=>{
    clearInterval(spin2);
    resultArr[1] = reels[1].innerText;
  },1800);

  setTimeout(()=>{
    clearInterval(spin3);
    resultArr[2] = reels[2].innerText;
    judge(resultArr);
  },2400);
}

// 判定とポイント計算
function judge(res){
  let result = document.getElementById("result");
  let point = 0;

  if(res[0] === res[1] && res[1] === res[2]){
    let symbol = res[0];
    point = triplePoints[symbol] || 0;
    result.className = "win";
    result.innerText = `✨✨✨ ${symbol}${symbol}${symbol} BIG BONUS ✨✨✨`;
    document.getElementById("win").play();
  }
  else if(res.includes("🍒")){
    point = 10;
    result.className="";
    result.innerText="🍒 チェリー小当たり！";
  }
  else if(res[0]===res[1] || res[1]===res[2] || res[0]===res[2]){
    point = 20;
    result.className="";
    result.innerText="ラッキー！ペア揃い😊";
  }
  else{
    point = 0;
    result.className="";
    result.innerText="はずれ😫";
  }

  totalPoint += point;
  localStorage.setItem("totalPoint", totalPoint);

  // 外枠に今回獲得POINTと累計POINTを反映
  updatePointFrame(point);
}

// 累計POINTリセット
function resetPoints(){
  totalPoint = 0;
  localStorage.setItem("totalPoint", totalPoint);
  updatePointFrame(0);
  document.getElementById("result").innerText="累計POINTをリセットしました。";
}
</script>

</body>
</html>
