<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎰 新スロットおみくじ 🎰</title>

<style>

body{
  text-align:center;
  font-family:sans-serif;
  background:linear-gradient(#fff5f5,#ffecec);
  margin:0;
}

h1{
  font-size:36px;
  color:#b30000;
  margin-top:20px;
  text-shadow:1px 1px 2px gold;
}

.slot{
  display:flex;
  justify-content:center;
  margin:40px auto;
}

.reel{
  font-size:60px;
  width:80px;
  height:80px;
  margin:0 5px;
  border:2px solid red;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff0f0;
  box-shadow:0 0 10px red inset;
}

button{
  font-size:26px;
  padding:15px 40px;
  margin-top:20px;
  background:#d60000;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  box-shadow:0 0 10px gold;
}

#result{
  font-size:32px;
  margin-top:20px;
  color:#b30000;
  white-space: pre-line;
  text-shadow:1px 1px 2px gold;
}

.win{
  font-size:40px;
  color:gold;
  animation:flash 0.4s infinite;
}

@keyframes flash{
0%{color:gold;}
50%{color:red;}
100%{color:gold;}
}

</style>
</head>

<body>

<h1>🎰 新スロットおみくじ 🎰</h1>

<div class="slot">
<div id="reel1" class="reel">❔</div>
<div id="reel2" class="reel">❔</div>
<div id="reel3" class="reel">❔</div>
</div>

<button onclick="spin()">スピン</button>

<div id="result"></div>

<audio id="win" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0c67.mp3"></audio>

<audio id="click" src="https://actions.google.com/sounds/v1/alarms/clock_ticking.ogg"></audio>

<script>

// 絵柄7種類
const symbols = ["𝟕","𝟑","🍒","BAR","🔔","💎","🍉"];

function spin(){

const reels=[
document.getElementById("reel1"),
document.getElementById("reel2"),
document.getElementById("reel3")
];

const click=document.getElementById("click");

let count=0;

const interval=setInterval(()=>{

for(let i=0;i<3;i++){

const symbol=symbols[Math.floor(Math.random()*symbols.length)];

if(symbol==="𝟕"){
reels[i].innerHTML=`<span style="color:red;font-weight:bold">${symbol}</span>`;
}
else if(symbol==="𝟑"){
reels[i].innerHTML=`<span style="color:blue;font-weight:bold">${symbol}</span>`;
}
else{
reels[i].innerHTML=symbol;
}

}

click.currentTime=0;
click.play();

count++;

if(count>20){

clearInterval(interval);

const res=reels.map(r=>r.innerText);

let message="";
let result=document.getElementById("result");
result.className="";

if(res[0]==="𝟕" && res[1]==="𝟕" && res[2]==="𝟕"){

message="✨✨✨ BIG BONUS 𝟕𝟕𝟕 ✨✨✨";
result.className="win";
document.getElementById("win").play();

}
else if(res.includes("🍒")){

message="🍒 チェリー小当たり！";

}
else if(res[0]===res[1] || res[1]===res[2] || res[0]===res[2]){

message="ラッキー！ペア揃い😊";

}
else{

message="はずれ…😢";

}

result.innerText=message;

}

},100);

}

</script>

</body>
</html>
